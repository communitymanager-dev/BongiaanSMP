<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BongiaanSMP</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="hero">

    <h1>BongiaanSMP</h1>
    <p>A modern Minecraft SMP with economy, events and more.</p>

    <div>
        <button class="btn green" onclick="copyIP()">Copy IP</button>

        <a href="https://discord.gg/YOUR_LINK">
            <button class="btn dark">Discord</button>
        </a>
    </div>

    <div class="card">
        🌐 play.bongiaansmp.net<br>
        👥 <span id="players">Loading...</span>
    </div>

</div>

<div class="section">

    <h2>Features</h2>

    <div class="grid">
        <div class="card">⚔️ Survival</div>
        <div class="card">💰 Economy</div>
        <div class="card">🏪 Player Shops</div>
        <div class="card">🎉 Events</div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
